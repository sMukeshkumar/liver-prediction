{% extends "base.html" %}
{% block title %}Register — LiverCare AI{% endblock %}

{% block extra_css %}
<style>
  body{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,194,255,.07) 0%,transparent 60%)}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;
             padding:2.5rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .auth-logo{display:flex;flex-direction:column;align-items:center;gap:.6rem;margin-bottom:2rem}
  .auth-icon{width:54px;height:54px;background:linear-gradient(135deg,var(--accent),var(--accent2));
             border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
  .auth-title{font-size:1.45rem;font-weight:800}
  .auth-sub{color:var(--text-muted);font-size:.87rem;text-align:center}
  .password-wrap{position:relative}
  .password-wrap .toggle-pw{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
     background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.85rem}
  .password-wrap .form-control{padding-right:2.8rem}
  .divider-text{display:flex;align-items:center;gap:1rem;color:var(--text-muted);font-size:.8rem;margin:1.2rem 0}
  .divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon"><i class="fa-solid fa-heart-pulse" style="color:#fff"></i></div>
      <div class="auth-title">Create Account</div>
      <div class="auth-sub">Join LiverCare AI for free</div>
    </div>

    <form method="POST" action="{{ url_for('register') }}" id="regForm">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon">
          <i class="fa fa-user"></i>
          <input type="text" name="name" class="form-control" placeholder="Dr. John Smith" required autocomplete="name"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fa fa-envelope"></i>
          <input type="email" name="email" class="form-control" placeholder="doctor@hospital.com" required autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="pw1" class="form-control" placeholder="Min 6 characters" required/>
          <button type="button" class="toggle-pw" onclick="togglePw('pw1',this)"><i class="fa fa-eye"></i></button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" name="confirm_password" id="pw2" class="form-control" placeholder="Repeat password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw('pw2',this)"><i class="fa fa-eye"></i></button>
        </div>
        <div id="pw-match" style="font-size:.78rem;margin-top:.4rem"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <i class="fa fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="divider-text">or</div>
    <div class="text-center" style="font-size:.88rem;color:var(--text-muted)">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--accent);font-weight:600"> Sign in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function togglePw(id, btn){
    const el = document.getElementById(id);
    const icon = btn.querySelector('i');
    if(el.type === 'password'){ el.type='text'; icon.className='fa fa-eye-slash'; }
    else{ el.type='password'; icon.className='fa fa-eye'; }
  }
  document.getElementById('pw2').addEventListener('input', function(){
    const v = document.getElementById('pw-match');
    if(this.value === document.getElementById('pw1').value){
      v.innerHTML='<span style="color:var(--success)"><i class="fa fa-check"></i> Passwords match</span>';
    } else {
      v.innerHTML='<span style="color:var(--danger)"><i class="fa fa-xmark"></i> Passwords do not match</span>';
    }
  });
</script>
{% endblock %}
