{% extends "base.html" %}
{% block title %}Login — LiverCare AI{% endblock %}

{% block extra_css %}
<style>
  body{background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(123,92,240,.07) 0%,transparent 60%)}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;
             padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .auth-logo{display:flex;flex-direction:column;align-items:center;gap:.6rem;margin-bottom:2rem}
  .auth-icon{width:54px;height:54px;background:linear-gradient(135deg,var(--accent2),var(--accent));
             border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
  .auth-title{font-size:1.45rem;font-weight:800}
  .auth-sub{color:var(--text-muted);font-size:.87rem;text-align:center}
  .password-wrap{position:relative}
  .toggle-pw{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
     background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.85rem}
  .password-wrap .form-control{padding-right:2.8rem}
  .divider-text{display:flex;align-items:center;gap:1rem;color:var(--text-muted);font-size:.8rem;margin:1.2rem 0}
  .divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon"><i class="fa-solid fa-stethoscope" style="color:#fff"></i></div>
      <div class="auth-title">Welcome Back</div>
      <div class="auth-sub">Sign in to LiverCare AI</div>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fa fa-envelope"></i>
          <input type="email" name="email" class="form-control" placeholder="doctor@hospital.com" required autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="pw" class="form-control" placeholder="Your password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fa fa-eye" id="eye-icon"></i></button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem">
        <i class="fa fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="divider-text">or</div>
    <div class="text-center" style="font-size:.88rem;color:var(--text-muted)">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--accent);font-weight:600"> Create one</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function togglePw(){
    const el=document.getElementById('pw'), icon=document.getElementById('eye-icon');
    if(el.type==='password'){el.type='text';icon.className='fa fa-eye-slash';}
    else{el.type='password';icon.className='fa fa-eye';}
  }
</script>
{% endblock %}
